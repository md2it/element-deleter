<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Element Deleter</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font: 14px/1.3 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #111827;
        background: #f3f4f6;
        overflow: visible;
      }
      .welcome-scene {
        position: relative;
        width: 100%;
        max-width: 360px;
        overflow: visible;
        --welcome-edge: 24px;
      }
      .welcome {
        --welcome-gap: 12px;
        --welcome-inline: 1.125rem;
        position: relative;
        z-index: 1;
        width: 100%;
        padding: 0 0 var(--welcome-inline);
        background: rgba(249, 250, 251, 0.92);
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        border-radius: 8px;
      }
      .welcome .dd-panel-divider {
        margin-block: var(--welcome-gap);
      }
      .welcome-body {
        padding: 0 var(--welcome-inline);
        min-height: var(--welcome-body-min, 0);
      }
      .welcome-sep {
        margin: var(--welcome-gap) 0;
        border: none;
        border-top: 1px solid #b91c1c;
      }
      .lang-block,
      .pin-block {
        margin: 0;
      }
      .dd-lang-row {
        display: flex;
        width: 100%;
        gap: 0.3rem;
        direction: ltr;
      }
      .dd-chip {
        border: 1px solid rgba(0, 0, 0, 0.07);
        background: #fff;
        color: #1f2937;
        cursor: pointer;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05), 0 0 10px rgba(0, 0, 0, 0.06);
        transition:
          background 0.15s ease,
          color 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      .dd-chip.is-active {
        background: #b91c1c;
        border-color: #b91c1c;
        color: #fff;
        box-shadow: none;
      }
      .dd-chip.is-active:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.9);
      }
      .dd-chip:not(.is-active):hover,
      .dd-chip:not(.is-active):focus-visible {
        color: #b91c1c;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06), 0 0 14px rgba(0, 0, 0, 0.09);
      }
      .dd-lang-btn.is-active:hover,
      .dd-lang-btn.is-active:focus-visible {
        color: #fff;
      }
      .dd-lang-btn {
        flex: 1 1 0;
        min-width: 0;
        padding: 0.35rem 0.25rem;
        border-radius: 0.4rem;
        font-size: 0.78rem;
        font-weight: 600;
      }
      .pin-heading {
        margin: 0 0 6px;
        font-weight: 600;
        color: #111827;
        text-align: center;
      }
      .pin-steps {
        margin: 0;
        padding-left: 1.2em;
      }
      .pin-steps li {
        margin: 0 0 4px;
        color: #374151;
      }
      .pin-steps li:last-child {
        margin-bottom: 0;
      }
      .pin-hint {
        position: fixed;
        top: 1cm;
        z-index: 10;
        pointer-events: none;
        direction: ltr;
        transform: translateX(-50%);
      }
      .pin-hint-composite {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: #b91c1c;
        animation: pin-hint-float 2.13s ease-in-out infinite;
        will-change: transform;
      }
      @keyframes pin-hint-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-16px);
        }
      }
      .pin-hint-icon {
        display: inline-flex;
        line-height: 0;
      }
      .pin-hint-icon svg {
        display: block;
      }
      .pin-hint-icon--arrow svg {
        width: 84px;
        height: 84px;
      }
      .pin-hint-icon--pin svg {
        width: 48px;
        height: 48px;
      }
      .pin-hint-icon--heart svg {
        width: 56px;
        height: 56px;
      }
      @media (prefers-reduced-motion: reduce) {
        .pin-hint-composite {
          animation: none;
        }
      }
      .step-icon {
        display: inline-flex;
        vertical-align: middle;
        align-items: center;
      }
      .step-icon svg {
        display: block;
        width: 14px;
        height: 14px;
        color: #374151;
      }
      .step-icon--ext svg,
      .step-icon--ext .ext-icon {
        width: 16px;
        height: 16px;
      }
      .ext-icon {
        display: block;
        border-radius: 3px;
      }
      .about-heading {
        margin: 0 0 6px;
        font-weight: 600;
        color: #111827;
        text-align: center;
      }
      .about-list {
        list-style: none;
        margin: 0;
        padding: 0;
        color: #374151;
      }
      .about-item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        margin: 0 0 4px;
      }
      .about-item:last-child {
        margin-bottom: 0;
      }
      .about-icon {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1rem;
        height: 1rem;
        line-height: 0;
        color: #6b7280;
      }
      .about-icon svg {
        display: block;
        width: 1rem;
        height: 1rem;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 10px;
        font: inherit;
        font-size: 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        color: #374151;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      }
      .button-icon {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        line-height: 0;
        color: #6b7280;
      }
      .button-icon svg {
        display: block;
        width: 14px;
        height: 14px;
      }
      button:hover {
        background: #f3f4f6;
      }
      button:focus-visible {
        outline: 2px solid #b91c1c;
        outline-offset: 2px;
      }
      .dd-chip:focus:not(:focus-visible) {
        outline: none;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="welcome-scene">
    <div id="pin-hint" class="pin-hint" dir="ltr" hidden aria-hidden="true">
      <div class="pin-hint-composite" id="pin-hint-guide">
        <span class="pin-hint-icon pin-hint-icon--arrow" id="pin-hint-arrow"></span>
        <span class="pin-hint-icon pin-hint-icon--pin" id="pin-hint-pin"></span>
      </div>
      <div class="pin-hint-composite pin-hint-pinned" id="pin-hint-pinned" hidden>
        <span class="pin-hint-icon pin-hint-icon--heart" id="pin-hint-heart"></span>
      </div>
    </div>
    <main class="welcome">
    <div id="welcome-header-mount"></div>
    <div class="welcome-body"></div>
    </main>
    </div>
    <script src="welcome.js"></script>
  </body>
</html>
