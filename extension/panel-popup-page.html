  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Element Deleter</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      html:not(.dd-panel-page--tab),
      html:not(.dd-panel-page--tab) body {
        width: 372px;

      html.dd-panel-page--tab,

      html.dd-panel-page--tab body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font: 14px/1.3 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #111827;
        background: #f3f4f6;
        overflow: auto;
      }
